<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE風チャットアプリ</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Supabaseの設定
    const SUPABASE_URL = "https://esmxetaqzojcitpnmbws.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzbXhldGFxem9qY2l0cG5tYndzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDM2ODIsImV4cCI6MjA4ODc3OTY4Mn0.Bq9lgljH0-1nynLi6IEa_Jkz8sNPIYozjXIknznK-Rs";
    
    // Supabaseクライアントの作成
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function App() {
      // --- State ---
      const [username, setUsername] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [isCheckingLogin, setIsCheckingLogin] = useState(true); // 自動ログイン確認中の状態
      const [errorMsg, setErrorMsg] = useState('');
      
      const [friends, setFriends] = useState([]);
      const [newFriendName, setNewFriendName] = useState('');
      
      const [currentView, setCurrentView] = useState('home');
      const [activeFriend, setActiveFriend] = useState(null);
      
      const [chats, setChats] = useState([]);
      const [messageInput, setMessageInput] = useState('');
      const [isUploading, setIsUploading] = useState(false);

      const [friendToDelete, setFriendToDelete] = useState(null);

      const messagesEndRef = useRef(null);
      const fileInputRef = useRef(null);

      const currentViewRef = useRef(currentView);
      const activeFriendRef = useRef(activeFriend);

      useEffect(() => { currentViewRef.current = currentView; }, [currentView]);
      useEffect(() => { activeFriendRef.current = activeFriend; }, [activeFriend]);

      // --- 初回起動時：自動ログインの確認 ---
      useEffect(() => {
        const checkAutoLogin = async () => {
          const savedUsername = localStorage.getItem('chat_username');
          if (savedUsername) {
            setUsername(savedUsername);
            await performLogin(savedUsername);
          }
          setIsCheckingLogin(false);
        };
        checkAutoLogin();
      }, []);


      // --- データベースから情報をリアルタイムで読み込む ---
      
      // 1. ユーザー情報（友達リスト）と、すべての新着メッセージの監視
      useEffect(() => {
        if (!isLoggedIn) return;

        const userChannel = supabase.channel('public:users')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, (payload) => {
            if (payload.new && payload.new.username === username) {
              setFriends(payload.new.friends || []);
            }
          })
          .subscribe();

        const messageChannel = supabase.channel('public:global_messages')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            const newMsg = payload.new;
            
            if (newMsg.sender === username) return;

            const roomUsers = newMsg.room_name.split('_');
            if (roomUsers.includes(username)) {
              
              const currentActiveRoom = activeFriendRef.current 
                ? [username, activeFriendRef.current].sort().join('_') 
                : null;

              if (currentViewRef.current === 'chat' && newMsg.room_name === currentActiveRoom) {
                setChats(prev => {
                  if (prev.find(m => m.id === newMsg.id)) return prev;
                  return [...prev, newMsg];
                });
              } else {
                if ('Notification' in window && Notification.permission === 'granted') {
                  const notificationText = newMsg.image_url ? "画像を送信しました📷" : newMsg.text;
                  new Notification(`${newMsg.sender}さんから新着メッセージ`, {
                    body: notificationText,
                    icon: "https://cdn-icons-png.flaticon.com/512/3114/3114810.png"
                  });
                }
              }
            }
          })
          .subscribe();

        return () => {
          supabase.removeChannel(userChannel);
          supabase.removeChannel(messageChannel);
        };
      }, [isLoggedIn, username]);

      // 2. トーク画面を開いたときに過去の履歴を読み込む
      useEffect(() => {
        if (currentView === 'chat' && activeFriend) {
          const roomName = [username, activeFriend].sort().join('_');
          
          const fetchMessages = async () => {
            const { data, error } = await supabase
              .from('messages')
              .select('*')
              .eq('room_name', roomName)
              .order('created_at', { ascending: true });
            
            if (data) setChats(data);
          };
          fetchMessages();
        }
      }, [currentView, activeFriend, username]);

      // スクロール処理
      useEffect(() => {
        if (currentView === 'chat') {
          setTimeout(() => {
            messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
          }, 100);
        }
      }, [chats, currentView, activeFriend]);

      // --- ハンドラー ---

      // ログイン処理本体
      const performLogin = async (name) => {
        setIsLoading(true);
        setErrorMsg('');

        try {
          if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission();
          }

          const { data, error } = await supabase
            .from('users')
            .select('friends')
            .eq('username', name)
            .single();

          if (error && error.code === 'PGRST116') {
            const { error: insertError } = await supabase
              .from('users')
              .insert([{ username: name, friends: [] }]);
            if (insertError) throw insertError;
            setFriends([]);
          } else if (data) {
            setFriends(data.friends || []);
          } else if (error) {
             throw error;
          }
          
          // ★ここで名前を記憶させる
          localStorage.setItem('chat_username', name);
          setIsLoggedIn(true);
        } catch (err) {
          console.error(err);
          setErrorMsg("ログインに失敗しました。SQLでのテーブル作成は完了していますか？");
        } finally {
          setIsLoading(false);
        }
      };

      // ログインボタンを押したとき
      const handleLogin = (e) => {
        e.preventDefault();
        const name = username.trim();
        if (!name) return;
        performLogin(name);
      };

      // ログアウト処理
      const handleLogout = () => {
        if (!confirm("ログアウトしますか？")) return;
        
        // 記憶した名前を消去
        localStorage.removeItem('chat_username');
        
        setIsLoggedIn(false);
        setUsername('');
        setFriends([]);
        setChats([]);
        setCurrentView('home');
        setActiveFriend(null);
      };

      const handleAddFriend = async (e) => {
        e.preventDefault();
        const name = newFriendName.trim();
        if (name && !friends.includes(name) && name !== username) {
          const newFriends = [...friends, name];
          setFriends(newFriends);
          setNewFriendName('');
          await supabase.from('users').update({ friends: newFriends }).eq('username', username);
        }
      };

      const handleRemoveFriend = async () => {
        if (!friendToDelete) return;
        const newFriends = friends.filter(f => f !== friendToDelete);
        setFriends(newFriends);
        
        if (activeFriend === friendToDelete) {
          setCurrentView('home');
          setActiveFriend(null);
        }
        setFriendToDelete(null);

        try {
          await supabase.from('users').update({ friends: newFriends }).eq('username', username);
        } catch (error) {
          console.error("友達の削除に失敗しました", error);
        }
      };

      const openChat = (friendName) => {
        setActiveFriend(friendName);
        setCurrentView('chat');
        setErrorMsg('');
      };

      const backToHome = () => {
        setCurrentView('home');
        setActiveFriend(null);
        setErrorMsg('');
      };

      const handleSendMessage = async () => {
        if (!messageInput.trim()) return;

        const now = new Date();
        const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        const roomName = [username, activeFriend].sort().join('_');
        const msgId = username + '_' + Date.now();

        const newMessage = {
          id: msgId,
          room_name: roomName,
          sender: username,
          text: messageInput.trim(),
          image_url: null,
          time: timeString,
        };

        setChats(prev => [...prev, newMessage]);
        setMessageInput('');

        try {
          const { error } = await supabase.from('messages').insert([newMessage]);
          if (error) console.error("送信エラー", error);
        } catch(e) {
          console.error("送信エラー", e);
        }
      };

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setIsUploading(true);
        setErrorMsg('');
        
        try {
          const fileExt = file.name.split('.').pop();
          const randomString = Math.random().toString(36).substring(2, 12);
          const fileName = `${Date.now()}_${randomString}.${fileExt}`;
          const filePath = `${fileName}`;

          const { data: uploadData, error: uploadError } = await supabase.storage
            .from('chat-images')
            .upload(filePath, file);

          if (uploadError) {
             console.error("Storage Error Detail:", uploadError);
             throw new Error(uploadError.message || "アップロードに失敗しました");
          }

          const { data: publicUrlData } = supabase.storage
            .from('chat-images')
            .getPublicUrl(filePath);

          const imageUrl = publicUrlData.publicUrl;

          const now = new Date();
          const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
          const msgId = username + '_' + Date.now();
          const roomName = [username, activeFriend].sort().join('_');

          const newMessage = {
            id: msgId,
            room_name: roomName,
            sender: username,
            text: null,
            image_url: imageUrl,
            time: timeString,
          };

          setChats(prev => [...prev, newMessage]);

          const { error: dbError } = await supabase.from('messages').insert([newMessage]);
          if (dbError) {
             throw new Error("データベース保存エラー: " + dbError.message);
          }

        } catch (error) {
          console.error("画像送信エラー全体:", error);
          setErrorMsg(`画像送信エラー: ${error.message}`);
        } finally {
          setIsUploading(false);
          if (fileInputRef.current) fileInputRef.current.value = '';
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.nativeEvent.isComposing) {
          e.preventDefault();
          handleSendMessage();
        }
      };

      // --- 自動ログイン確認中の画面 ---
      if (isCheckingLogin) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-gray-100">
            <i className="fa-solid fa-spinner fa-spin text-4xl text-[#06C755]"></i>
          </div>
        );
      }

      // --- ログイン画面 ---
      if (!isLoggedIn) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-gray-100">
            <div className="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm mx-4">
              <div className="flex justify-center mb-6">
                <div className="bg-[#06C755] w-16 h-16 rounded-full flex items-center justify-center text-white">
                  <i className="fa-solid fa-comment-dots text-3xl"></i>
                </div>
              </div>
              <h1 className="text-2xl font-bold text-center mb-6 text-gray-800">ようこそ</h1>
              
              {errorMsg && (
                  <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm break-words">
                      {errorMsg}
                  </div>
              )}

              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">
                    アカウント名（あなたの名前）を入力してください
                  </label>
                  <input
                    type="text"
                    value={username}
                    onChange={(e) => setUsername(e.target.value)}
                    className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#06C755] focus:border-transparent transition-colors"
                    placeholder="名前を入力..."
                    autoFocus
                  />
                </div>
                <button
                  type="submit"
                  disabled={isLoading}
                  className="w-full bg-[#06C755] hover:bg-[#05b34c] disabled:bg-[#a5e8c1] text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center h-12"
                >
                  {isLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : "はじめる"}
                </button>
              </form>
            </div>
          </div>
        );
      }

      // --- メイン画面 ---
      return (
        <div className="flex justify-center min-h-screen bg-gray-200 py-0 sm:py-8">
          <div className="w-full max-w-md bg-white sm:rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col relative sm:border-[8px] border-gray-800 h-screen sm:h-[800px]">
            
            {/* ホーム画面 */}
            {currentView === 'home' && (
              <div className="flex flex-col h-full bg-white relative">
                <header className="bg-white border-b border-gray-200 px-4 py-4 sticky top-0 z-10 flex justify-between items-center">
                  <h1 className="text-xl font-bold text-gray-800">ホーム</h1>
                  
                  <div className="flex items-center space-x-4">
                    {/* 通知アイコン */}
                    {'Notification' in window && Notification.permission === 'granted' && (
                      <i className="fa-regular fa-bell text-gray-400 text-sm" title="通知ON"></i>
                    )}
                    {/* ログアウトボタンを追加 */}
                    <button 
                      onClick={handleLogout}
                      className="text-gray-400 hover:text-gray-600 transition"
                      title="ログアウト"
                    >
                      <i className="fa-solid fa-arrow-right-from-bracket text-lg"></i>
                    </button>
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto">
                  <div className="p-4 flex items-center space-x-4 border-b border-gray-100">
                    <div className="bg-gray-200 w-12 h-12 rounded-full flex items-center justify-center text-gray-500">
                      <i className="fa-solid fa-user text-2xl"></i>
                    </div>
                    <div>
                      <h2 className="text-lg font-bold text-gray-800">{username}</h2>
                      <p className="text-sm text-gray-500">自分のアカウント</p>
                    </div>
                  </div>

                  <div className="p-4 bg-gray-50 border-b border-gray-100">
                    <h3 className="text-sm font-bold text-gray-500 mb-3">友達を追加</h3>
                    <form onSubmit={handleAddFriend} className="flex space-x-2">
                      <input
                        type="text"
                        value={newFriendName}
                        onChange={(e) => setNewFriendName(e.target.value)}
                        placeholder="友達の名前を入力..."
                        className="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-[#06C755] focus:ring-1 focus:ring-[#06C755]"
                      />
                      <button
                        type="submit"
                        className="bg-[#06C755] text-white p-2 px-4 rounded-full hover:bg-[#05b34c] transition flex items-center space-x-2"
                      >
                        <i className="fa-solid fa-user-plus text-sm"></i>
                        <span className="text-sm font-bold">追加</span>
                      </button>
                    </form>
                  </div>

                  <div className="p-4">
                    <h3 className="text-sm font-bold text-gray-500 mb-3">
                      友達リスト {friends.length > 0 && `(${friends.length})`}
                    </h3>
                    {friends.length === 0 ? (
                      <p className="text-gray-400 text-sm text-center py-8">
                        まだ友達がいません。<br />上の入力欄から追加してみましょう！
                      </p>
                    ) : (
                      <ul className="space-y-1">
                        {friends.map((friend, index) => (
                          <li key={index} className="flex items-center">
                            <button
                              onClick={() => openChat(friend)}
                              className="flex-1 flex items-center p-3 rounded-xl hover:bg-gray-100 transition duration-150 text-left space-x-4"
                            >
                              <div className="bg-blue-100 w-10 h-10 rounded-full flex items-center justify-center text-blue-500">
                                <i className="fa-solid fa-user text-xl"></i>
                              </div>
                              <span className="text-gray-800 font-medium text-lg flex-1">
                                {friend}
                              </span>
                            </button>
                            <button
                              onClick={() => setFriendToDelete(friend)}
                              className="p-3 ml-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition duration-150 flex-shrink-0"
                              title={`${friend}さんを削除`}
                            >
                              <i className="fa-solid fa-user-minus"></i>
                            </button>
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* トーク画面 */}
            {currentView === 'chat' && (
              <div className="flex flex-col h-full bg-[#7494C0]">
                <header className="bg-white/95 backdrop-blur-sm px-2 py-3 flex items-center shadow-sm sticky top-0 z-10 relative">
                  <button
                    onClick={backToHome}
                    className="p-2 text-gray-600 hover:bg-gray-100 rounded-full transition w-10 h-10 flex items-center justify-center"
                  >
                    <i className="fa-solid fa-chevron-left text-xl"></i>
                  </button>
                  <h1 className="text-lg font-bold text-gray-800 ml-2">{activeFriend}</h1>
                  
                  {errorMsg && (
                    <div className="absolute top-14 left-2 right-2 bg-red-100 border border-red-400 text-red-700 px-3 py-2 rounded text-xs shadow-md z-20 break-words">
                      {errorMsg}
                    </div>
                  )}
                </header>

                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                  <p className="text-center text-xs text-white/70 mb-4 bg-black/10 mx-auto w-fit px-3 py-1 rounded-full">
                    {activeFriend} さんとのトークを始めました
                  </p>

                  {chats.map((msg, index) => {
                    const isMe = msg.sender === username;
                    return (
                      <div
                        key={index}
                        className={`flex ${isMe ? 'justify-end' : 'justify-start'}`}
                      >
                        {!isMe && (
                          <div className="w-8 h-8 rounded-full bg-gray-300 flex-shrink-0 mr-2 flex items-center justify-center overflow-hidden mt-1">
                            <i className="fa-solid fa-user text-gray-500"></i>
                          </div>
                        )}
                        <div className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[75%]`}>
                          
                          <div className={`flex items-end space-x-1 ${isMe ? 'flex-row-reverse space-x-reverse' : 'flex-row'}`}>
                            
                            {msg.image_url ? (
                              <img 
                                src={msg.image_url} 
                                alt="送信された画像" 
                                className="max-w-[200px] sm:max-w-[250px] rounded-2xl shadow-sm border border-black/10 bg-white min-h-[50px] min-w-[50px]"
                                onLoad={() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' })}
                                onError={(e) => { e.target.src = 'https://placehold.co/200x200?text=Image+Error'; }}
                              />
                            ) : (
                              <div
                                className={`px-4 py-2 text-[15px] leading-relaxed break-words rounded-2xl ${
                                  isMe
                                    ? 'bg-[#85E249] rounded-tr-sm text-gray-800'
                                    : 'bg-white rounded-tl-sm text-gray-800'
                                } shadow-sm`}
                              >
                                {msg.text}
                              </div>
                            )}

                            <span className="text-[10px] text-white/80 pb-1 flex-shrink-0">
                              {msg.time}
                            </span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  <div ref={messagesEndRef} />
                </div>

                {/* 入力エリア */}
                <div className="bg-white p-2 border-t border-gray-200">
                  <div className="flex items-end bg-gray-100 rounded-2xl px-2 py-1">
                    
                    <input 
                      type="file" 
                      accept="image/*" 
                      className="hidden" 
                      ref={fileInputRef}
                      onChange={handleImageUpload}
                    />
                    <button
                      onClick={() => fileInputRef.current?.click()}
                      disabled={isUploading}
                      className="p-2 mb-1 text-gray-500 hover:text-gray-700 transition w-10 h-10 flex items-center justify-center flex-shrink-0"
                    >
                      {isUploading ? (
                         <i className="fa-solid fa-spinner fa-spin text-lg"></i>
                      ) : (
                         <i className="fa-regular fa-image text-xl"></i>
                      )}
                    </button>

                    <textarea
                      value={messageInput}
                      onChange={(e) => setMessageInput(e.target.value)}
                      onKeyDown={handleKeyDown}
                      placeholder="メッセージを入力..."
                      className="flex-1 bg-transparent border-none focus:ring-0 resize-none max-h-32 min-h-[40px] py-2 px-2 text-gray-800 focus:outline-none"
                      rows={1}
                    />
                    
                    <button
                      onClick={handleSendMessage}
                      disabled={!messageInput.trim() || isUploading}
                      className="p-2 mb-1 text-blue-500 disabled:text-gray-400 hover:text-blue-600 transition w-10 h-10 flex items-center justify-center flex-shrink-0"
                    >
                      <i className="fa-solid fa-paper-plane text-xl"></i>
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* 削除確認用オーバーレイ（モーダル） */}
            {friendToDelete && (
              <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-[fadeIn_0.2s_ease-out]">
                  <h3 className="text-lg font-bold text-gray-800 mb-2 flex items-center text-red-500">
                    <i className="fa-solid fa-triangle-exclamation mr-2"></i>確認
                  </h3>
                  <p className="text-gray-600 mb-6 text-sm leading-relaxed">
                    「<span className="font-bold text-gray-800">{friendToDelete}</span>」さんを友達リストから削除しますか？<br/>
                    <span className="text-xs text-gray-400 block mt-2">※過去のトーク履歴は消えません。</span>
                  </p>
                  <div className="flex justify-end space-x-3">
                    <button
                      onClick={() => setFriendToDelete(null)}
                      className="px-4 py-2 rounded-xl text-gray-600 font-medium hover:bg-gray-100 transition"
                    >
                      キャンセル
                    </button>
                    <button
                      onClick={handleRemoveFriend}
                      className="px-4 py-2 rounded-xl bg-red-500 text-white font-medium hover:bg-red-600 transition flex items-center"
                    >
                      <i className="fa-solid fa-user-minus mr-2"></i>削除する
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes fadeIn {
